    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #ff00ff;
            --pi-yellow: #ffcc00;
            --dark-bg: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--dark-bg);
            color: #ccc;
            font-family: 'Share Tech Mono', monospace;
            overflow-x: hidden;
            background-image:
                radial-gradient(1px 1px at 10% 10%, #fff, transparent),
                radial-gradient(1px 1px at 20% 50%, #fff, transparent),
                radial-gradient(1px 1px at 50% 20%, #fff, transparent),
                radial-gradient(1px 1px at 80% 80%, #fff, transparent);
            background-size: 200px 200px;
            animation: starsMove 100s linear infinite;
        }

        @keyframes starsMove {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 1000px 1000px;
            }
        }

        /* CRT SCANLINE EFFECT */
        body::after {
            content: " ";
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .terminal-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid var(--neon-cyan);
            background: rgba(0, 0, 0, 0.85);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            position: relative;
            backdrop-filter: blur(5px);
        }

        header {
            border-bottom: 2px solid var(--neon-cyan);
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            font-size: 1.5rem;
            letter-spacing: 4px;
        }

        .lang-select {
            background: #111;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            padding: 5px 10px;
            font-family: inherit;
            cursor: pointer;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
        }

        .tab-btn.active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .content-area {
            height: 60vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            scrollbar-width: thin;
            scrollbar-color: var(--neon-cyan) #000;
        }

        h2 {
            color: var(--pi-yellow);
            margin-bottom: 20px;
            font-size: 1.2rem;
            border-left: 4px solid var(--pi-yellow);
            padding-left: 10px;
        }

        h3 {
            color: var(--neon-cyan);
            margin: 25px 0 10px 0;
            font-size: 1rem;
        }

        p {
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 0.9rem;
        }

        strong {
            color: #fff;
        }

        footer {
            margin-top: 20px;
            font-size: 0.7rem;
            opacity: 0.5;
            display: flex;
            justify-content: space-between;
        }

        .glitch-text {
            animation: ripple 5s infinite;
        }

        @keyframes ripple {
            0% {
                transform: skewX(0);
            }

            1% {
                transform: skewX(20deg);
            }

            2% {
                transform: skewX(0);
            }
        }

        @media (max-width: 600px) {
            .terminal-container {
                margin: 10px;
            }

            .tabs {
                flex-direction: column;
            }

            header {
                flex-direction: column;
                gap: 10px;
            }
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            padding: 8px 16px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            touch-action: manipulation;
        }

        .back-btn:hover,
        .back-btn:active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
    </style>
</head>

            if (currentTab === 'terms') {
                document.getElementById('mainContent').innerHTML = `<h2>${lang.termsHeader}</h2>` + lang.termsContent;
                document.getElementById('btnTerms').classList.add('active');
                document.getElementById('btnPrivacy').classList.remove('active');
            } else {
                document.getElementById('mainContent').innerHTML = `<h2>${lang.privacyHeader}</h2>` + lang.privacyContent;
                document.getElementById('btnPrivacy').classList.add('active');
                document.getElementById('btnTerms').classList.remove('active');
            }
        }

        document.getElementById('langSelect').addEventListener('change', (e) => {
            currentLang = e.target.value;
            render();
        });

        document.getElementById('btnTerms').addEventListener('click', () => {
            currentTab = 'terms';
            render();
        });

        document.getElementById('btnPrivacy').addEventListener('click', () => {
            currentTab = 'privacy';
            render();
        });

        render();
    </script>

</body>

</html>
